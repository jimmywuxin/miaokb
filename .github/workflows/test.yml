name: tests

# 触发条件：main / feature 分支的 push + 所有 PR
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # 测试期间 indexer.KB_ROOT 默认指向 mac mini 路径，
      # CI 上不存在也没关系——tests 用 tmpdir 覆盖全局。
      # 但 indexer.build_index() 默认使用 KB_ROOT，import 阶段不会触发 build，
      # 这里设占位避免任何意外触碰真实路径。
      - name: Set KB_ROOT to dummy path
        env:
          KB_ROOT: /tmp/miaokb-ci-dummy
        run: mkdir -p "$KB_ROOT"

      - name: Run unit tests
        run: |
          python3 -m unittest discover tests -v

